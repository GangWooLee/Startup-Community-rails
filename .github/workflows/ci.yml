name: CI

on:
  pull_request:
  push:
    branches: [ main ]

# Cancel in-progress runs for the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===== Security Scans (병렬 실행) =====
  scan_ruby:
    name: 🔒 Security Scan (Ruby)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for Rails security vulnerabilities
        # config/brakeman.yml에서 제외 파일 명시
        run: bin/brakeman --no-pager

      - name: Scan for vulnerable gems
        run: bin/bundler-audit check --update

  scan_js:
    name: 🔒 Security Scan (JS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan JS dependencies
        run: bin/importmap audit

  # ===== Code Quality =====
  lint:
    name: 🎨 Lint (Rubocop)
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v5
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  # ===== Tests =====
  test:
    name: 🧪 Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: [ lint ]
    env:
      RAILS_ENV: test
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      GEMINI_API_KEY: "test_dummy_key"
      RESEND_API_KEY: "test_dummy_key"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare database
        run: bin/rails db:test:prepare

      - name: Run tests
        run: bin/rails test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

  system-test:
    name: 🖥️ System Tests
    runs-on: ubuntu-latest
    needs: [ test ]
    # 2026-01-08: 테스트 헬퍼 통합 완료로 continue-on-error 제거
    # 이제 시스템 테스트도 필수 통과 조건
    env:
      RAILS_ENV: test
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      GEMINI_API_KEY: "test_dummy_key"
      RESEND_API_KEY: "test_dummy_key"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Prepare database
        run: bin/rails db:test:prepare

      - name: Run System Tests
        run: bin/rails test:system

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore

  # ===== Playwright E2E Tests =====
  # NOTE: E2E 테스트는 CI에서 제거됨 (2026-01-12)
  # - CI 환경에서 불안정하고 디버깅이 어려움
  # - 로컬에서 수동으로 실행: npx playwright test
  # - 중요한 변경 후 반드시 로컬 E2E 테스트 필수!

  # ===== CI Success Gate =====
  ci-success:
    name: ✅ CI Success
    runs-on: ubuntu-latest
    needs: [ scan_ruby, scan_js, lint, test, system-test ]
    if: always()
    env:
      SCAN_RUBY_RESULT: ${{ needs.scan_ruby.result }}
      SCAN_JS_RESULT: ${{ needs.scan_js.result }}
      LINT_RESULT: ${{ needs.lint.result }}
      TEST_RESULT: ${{ needs.test.result }}
      SYSTEM_TEST_RESULT: ${{ needs.system-test.result }}
    steps:
      - name: Check required jobs passed
        run: |
          echo "📊 Job Results:"
          echo "  - Security Scan (Ruby): $SCAN_RUBY_RESULT"
          echo "  - Security Scan (JS): $SCAN_JS_RESULT"
          echo "  - Lint: $LINT_RESULT"
          echo "  - Unit Tests: $TEST_RESULT"
          echo "  - System Tests: $SYSTEM_TEST_RESULT"
          echo ""
          echo "ℹ️ E2E Tests: 로컬에서 수동 실행 필요 (npx playwright test)"
          echo ""

          # Required jobs check
          if [[ "$SCAN_RUBY_RESULT" != "success" ]] || \
             [[ "$SCAN_JS_RESULT" != "success" ]] || \
             [[ "$LINT_RESULT" != "success" ]] || \
             [[ "$TEST_RESULT" != "success" ]] || \
             [[ "$SYSTEM_TEST_RESULT" != "success" ]]; then
            echo "❌ One or more required jobs failed"
            exit 1
          fi

          echo "✅ All required CI jobs passed!"
